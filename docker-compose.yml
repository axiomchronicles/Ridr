services:
  backend:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_NAMESPACE:-kuroyami}/ridr-backend:${RIDR_IMAGE_TAG:-latest}
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ridr-backend
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/ridr.db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: '${CORS_ORIGINS:-["https://ecoridr.tubox.cloud","http://ecoridr.tubox.cloud","http://localhost:3000","http://127.0.0.1:3000","http://localhost:5173","http://127.0.0.1:5173"]}'
    volumes:
      - ridr_backend_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_NAMESPACE:-kuroyami}/ridr-frontend:${RIDR_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_DOCKER_API_BASE_URL:-/api/v1}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    container_name: ridr-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://127.0.0.1:3000/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    pull_policy: always
    container_name: ridr-nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/www:/var/www/certbot:ro
    restart: unless-stopped

volumes:
  ridr_backend_data:
