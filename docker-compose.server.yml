services:
  backend:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_NAMESPACE:-kuroyami}/ridr-backend:${RIDR_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: ridr-backend
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: sqlite:////app/data/ridr.db
      JWT_SECRET_KEY: change-me-in-production
      CORS_ORIGINS: '["https://ecoridr.tubox.cloud","http://ecoridr.tubox.cloud","http://localhost:3000","http://127.0.0.1:3000","http://localhost:5173","http://127.0.0.1:5173"]'
    volumes:
      - ridr_backend_data:/app/data
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_NAMESPACE:-kuroyami}/ridr-frontend:${RIDR_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: ridr-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://127.0.0.1:3000/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    pull_policy: always
    container_name: ridr-nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/www:/var/www/certbot:ro
    restart: unless-stopped

volumes:
  ridr_backend_data: